<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Liltmoon</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #07121f;
        --surface: rgba(255, 255, 255, 0.08);
        --ink: #eef6fb;
        --muted: #bfd0de;
        --line: rgba(255, 255, 255, 0.12);
        --accent: #d9ecff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Inter", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        background:
          radial-gradient(circle at top, rgba(128, 164, 205, 0.22), transparent 30%),
          linear-gradient(180deg, #0b1830 0%, #07121f 60%, #050c14 100%);
        color: var(--ink);
      }

      main {
        width: min(760px, 100%);
        padding: 36px;
        border: 1px solid var(--line);
        border-radius: 28px;
        background: var(--surface);
        backdrop-filter: blur(12px);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.28);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(34px, 7vw, 56px);
      }

      p {
        margin: 0;
        line-height: 1.7;
        color: var(--muted);
      }

      .meta {
        margin-top: 14px;
        font-size: 14px;
        color: rgba(239, 246, 255, 0.78);
      }

      .links {
        display: grid;
        gap: 14px;
        margin-top: 28px;
      }

      a {
        display: block;
        padding: 16px 18px;
        border: 1px solid var(--line);
        border-radius: 16px;
        color: var(--accent);
        text-decoration: none;
        background: rgba(255, 255, 255, 0.04);
      }

      a:hover {
        background: rgba(255, 255, 255, 0.08);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Liltmoon</h1>
      <p>
        Liltmoon is an iPhone sleep support app designed to lower bedtime rumination and make nighttime awakenings
        feel easier to handle.
      </p>
      <p class="meta">Public information for the App Store version of Liltmoon. Last updated: April 7, 2026.</p>
      <div class="links">
        <a href="./privacy-policy.html">Privacy Policy</a>
        <a href="./support.html">Support</a>
      </div>
    </main>
  </body>
</html>
